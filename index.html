<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог игр</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(15, 23, 42, 0.72);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #e5e7eb;
      --accent: #38bdf8;
      --accent-2: #a78bfa;
      --font-main: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-main);
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 24px;
    }

    .catalog {
      max-width: 1000px;
      margin: 0 auto;
    }

    .catalog-title {
      text-align: center;
      margin: 0 0 24px;
      font-size: 28px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .game-card {
      padding: 20px 16px;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      text-align: left;
      color: #fff;
    }

    .game-card h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .game-card p {
      margin: 0 0 12px;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.4;
    }

    .game-link {
      display: block;
      padding: 8px 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 10px;
      text-align: center;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .game-link:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="catalog">
    <h1 class="catalog-title">Каталог игр</h1>

    <div class="games-grid">
      <div class="game-card">
        <h2>Breakout</h2>
        <p>Arcanoid‑стайл с блоками и мячом</p>
        <a class="game-link" href="https://veronikaaliciapetrova.github.io/Breakout/">
          Играть в Breakout
        </a>
      </div>

      <div class="game-card">
        <h2>Змейка</h2>
        <p>Классическая змейка на поле 20×20</p>
        <a class="game-link" href="https://veronikaaliciapetrova.github.io/Snake/">
          Играть в Змейку
        </a>
      </div>

      <div class="game-card">
        <h2>Крестики‑нолики</h2>
        <p>Одиночная игра на 3×3 поле</p>
        <a class="game-link" href="https://veronikaaliciapetrova.github.io/Tic-Tac-Toe/">
          Играть в Крестики‑нолики
        </a>
      </div>

      <div class="game-card">
        <h2>Тетрис</h2>
        <p>Классический тетрис с фигурами</p>
        <a class="game-link" href="https://veronikaaliciapetrova.github.io/Tetris/">
          Играть в Тетрис
        </a>
      </div>
    </div>
  </div>
</body>
</html>
